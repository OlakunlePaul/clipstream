<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipStream</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-box">C</div>
        <h1>ClipStream</h1>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text">Syncing</span>
      </div>
    </header>

    <main id="app">
      <div id="permission-view" class="view hidden">
        <div class="empty-state">
          <div class="icon-circle">📋</div>
          <h2>Clipboard Access Needed</h2>
          <p>Please grant permission to allow ClipStream to sync your clipboard history.</p>
          <button id="grant-btn" class="primary-btn">Grant Permission</button>
        </div>
      </div>

      <div id="history-view" class="view">
        <div class="view-header">
          <h2>Recent History</h2>
          <button id="clear-all-btn" class="text-btn">Clear All</button>
        </div>
        <div id="history-list" class="history-list">
          <!-- Items injected here -->
        </div>
        <div id="empty-history" class="empty-state hidden">
          <p>No clipboard history yet.</p>
        </div>
      </div>
    </main>

    <footer>
      <p>Last 3 items shown</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
